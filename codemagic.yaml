workflows:
  ios-workflow:
    name: iOS Workflow
    working_directory: frontend

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      - name: Generate code
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Clean iOS build
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Simulator (NO SIGNING REQUIRED)
        script: |
          flutter build ios --debug --simulator

    artifacts:
      - build/ios/iphonesimulator/*.app