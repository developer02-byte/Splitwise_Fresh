workflows:
  default-workflow:
    name: Default Workflow
    working_directory: frontend

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Flutter doctor
        script: flutter doctor

      - name: Install dependencies
        script: flutter pub get

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app