name: SplitEase CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Backend Lint, Test & Build
  # ─────────────────────────────────────────────
  backend:
    name: Backend — Lint, Test & Docker Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: splitease
          POSTGRES_PASSWORD: splitease
          POSTGRES_DB: splitease_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npx prisma generate

      - name: Run Prisma Migrations (Test DB)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://splitease:splitease@localhost:5432/splitease_test"

      - name: TypeScript Compile Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: "postgresql://splitease:splitease@localhost:5432/splitease_test"
          NODE_ENV: test

      - name: Build Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t splitease-backend:${{ github.sha }} .
          echo "Docker image built: splitease-backend:${{ github.sha }}"

  # ─────────────────────────────────────────────
  # JOB 2: Flutter Lint, Test & Web Build
  # ─────────────────────────────────────────────
  flutter:
    name: Flutter — Analyze, Test & Build Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (Lint)
        run: flutter analyze

      - name: Run Tests
        run: flutter test --coverage

      - name: Build Web (Production)
        if: github.ref == 'refs/heads/main'
        run: flutter build web --release --tree-shake-icons

      - name: Upload Web Build Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: frontend/build/web

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Hetzner VPS (main only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Hetzner VPS
    needs: [backend, flutter]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/splitease
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec backend npx prisma migrate deploy
            echo "✅ Backend deployed successfully"
