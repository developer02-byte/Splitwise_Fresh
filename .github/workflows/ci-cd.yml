name: SplitEase CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Compile TypeScript
        run: npx tsc

      - name: Tests (non-blocking)
        run: npx vitest run --passWithNoTests
        continue-on-error: true

      - name: Verify Docker build (main only)
        if: github.ref == 'refs/heads/main'
        run: docker build -t backend:ci-test .


  flutter:
    name: Flutter — Build Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'

      - name: Clean and install deps
        run: |
          flutter clean
          flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Tests (non-blocking)
        run: flutter test || echo "Tests failed or no tests found"
        continue-on-error: true

      - name: Verify Web Build
        run: flutter build web --release
