name: SplitEase CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Clean install
        working-directory: backend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Debug package.json
        working-directory: backend
        run: cat package.json

      - name: Ensure TypeScript installed
        working-directory: backend
        run: |
          npm install typescript --save-dev || true

      - name: Compile TypeScript directly
        working-directory: backend
        run: |
          npx tsc

      - name: Prisma generate
        run: npx prisma generate
        continue-on-error: true

      - name: Prisma migrate (optional)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://splitease:splitease@localhost:5432/splitease_test"
        continue-on-error: true

      - name: Type check (non-blocking)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Tests (non-blocking)
        run: npx vitest run --passWithNoTests
        continue-on-error: true

      - name: Docker build (main only)
        if: github.ref == 'refs/heads/main'
        run: docker build -t backend:${{ github.sha }} .


  flutter:
    name: Flutter — Build Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'

      - name: Install deps
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-warnings
        continue-on-error: true

      - name: Tests (non-blocking)
        run: flutter test --pass-with-no-tests
        continue-on-error: true

      - name: Build web
        run: flutter build web --release


  deploy:
    name: Deploy to VPS
    needs: [backend, flutter]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/splitease
            git pull origin main
            docker compose up -d --build
            echo "Deployed"