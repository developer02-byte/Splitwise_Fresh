name: Splitease Deployment Workflow

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ── Backend Node ──
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Deps and Prisma
        run: |
          cd backend
          npm install
          npx prisma generate
          npm run build

      # ── Docker Build & Push ──
      - name: Login to DockerHub
        uses: docker/login-action@v2
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Fastify API
        uses: docker/build-push-action@v4
        continue-on-error: true
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/splitease-api:latest

      - name: Build and Push Flutter Web
        uses: docker/build-push-action@v4
        continue-on-error: true
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/splitease-frontend:latest

      # ── Production VPS Trigger ──
      - name: Deploy to Cloud via SSH
        uses: appleboy/ssh-action@v1.0.0
        continue-on-error: true
        with:
          host: ${{ secrets.SERVER_HOST }}     # e.g., Your root VPC IP
          username: ${{ secrets.SERVER_USER }} # e.g., root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/splitease
            docker compose pull
            docker compose up -d --build
            docker system prune -f
