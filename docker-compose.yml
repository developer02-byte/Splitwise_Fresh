services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:17-alpine
    container_name: splitease-postgres
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d splitease"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Cache / Queue ──
  redis:
    image: redis:8-alpine
    container_name: splitease-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API (Fastify + Prisma) ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splitease-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["sh", "-c", "npx prisma generate && npx prisma db push --skip-generate && npx tsx src/index.ts"]
    restart: unless-stopped

  # ── NGINX (Frontend build + Reverse Proxy) ──
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost/api
    container_name: splitease-nginx
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
